openapi: 3.0.3
info:
  title: Cart Item Query API
  version: 1.0.0
  description: Read operations for retrieving cart items in the e-commerce application.

paths:

  # ---------------------------------------------------------------------------
  # GET /cart/{cart_id}/items — Get all items in cart
  # ---------------------------------------------------------------------------
  /cart/{cart_id}/items:
    get:
      summary: Get all items in cart
      operationId: getCartItems
      tags:
        - Cart Items
      parameters:
        - $ref: '#/components/parameters/CartIdPath'
        - $ref: './common/parameters.yaml#/components/parameters/TraceHeader'
        - $ref: './common/parameters.yaml#/components/parameters/BusinessUnitHeader'
        - $ref: './common/parameters.yaml#/components/parameters/CountryCodeHeader'
      responses:
        '200':
          description: Cart items retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCartItemsResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---------------------------------------------------------------------------
  # GET /cart/{cart_id}/items/{cart_item_id} — Get a specific cart item
  # ---------------------------------------------------------------------------
  /cart/{cart_id}/items/{cart_item_id}:
    get:
      summary: Get a specific cart item by ID
      operationId: getCartItemById
      tags:
        - Cart Items
      parameters:
        - $ref: '#/components/parameters/CartIdPath'
        - $ref: '#/components/parameters/CartItemIdPath'
        - $ref: './common/parameters.yaml#/components/parameters/TraceHeader'
        - $ref: './common/parameters.yaml#/components/parameters/BusinessUnitHeader'
        - $ref: './common/parameters.yaml#/components/parameters/CountryCodeHeader'
      responses:
        '200':
          description: Cart item retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCartItemByIdResponse'
        '404':
          $ref: '#/components/responses/NotFound'

# =============================================================================
# Components
# =============================================================================
components:

  # ---------------------------------------------------------------------------
  # Reusable Parameters
  # ---------------------------------------------------------------------------
  parameters:
    CartIdPath:
      name: cart_id
      in: path
      required: true
      description: UUID of the cart
      schema:
        type: string
        format: uuid
        example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"

    CartItemIdPath:
      name: cart_item_id
      in: path
      required: true
      description: UUID of the cart item
      schema:
        type: string
        format: uuid
        example: "b2c3d4e5-f6a7-8901-bcde-f23456789012"

  # ---------------------------------------------------------------------------
  # Reusable Responses
  # ---------------------------------------------------------------------------
  responses:
    NotFound:
      description: Cart or cart item not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  # ---------------------------------------------------------------------------
  # Schemas / DTOs
  # ---------------------------------------------------------------------------
  schemas:

    # ── Response DTOs ────────────────────────────────────────────────────────────
    
    GetCartItemsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'
        cart_id:
          type: string
          format: uuid
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        total_items:
          type: integer
          example: 2
        total_price:
          type: number
          format: float
          example: 2599.98

    GetCartItemByIdResponse:
      type: object
      properties:
        cart_item_id:
          type: string
          format: uuid
          example: "b2c3d4e5-f6a7-8901-bcde-f23456789012"
        cart_id:
          type: string
          format: uuid
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        product_id:
          type: string
          format: uuid
          example: "c3d4e5f6-a7b8-9012-cdef-345678901234"
        quantity:
          type: integer
          example: 2
        price:
          type: number
          format: float
          example: 1299.99
        created_at:
          type: string
          format: date-time
          example: "2024-06-20T08:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2024-06-20T08:00:00Z"

    # ── Reusable Cart Item DTO ────────────────────────────────────────────────────
    CartItem:
      type: object
      properties:
        cart_item_id:
          type: string
          format: uuid
          example: "b2c3d4e5-f6a7-8901-bcde-f23456789012"
        cart_id:
          type: string
          format: uuid
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        product_id:
          type: string
          format: uuid
          example: "c3d4e5f6-a7b8-9012-cdef-345678901234"
        product_name:
          type: string
          example: "iPhone 15 Pro Case"
        product_image:
          type: array
          items:
            type: string
            format: uri
          nullable: true
          example: ["https://cdn.example.com/product.jpg"]
        quantity:
          type: integer
          example: 2
        price:
          type: number
          format: float
          example: 1299.99
        subtotal:
          type: number
          format: float
          example: 2599.98
        created_at:
          type: string
          format: date-time
          example: "2024-06-20T08:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2024-06-20T08:00:00Z"

    # ── Error DTO ─────────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          example: 404
        error:
          type: string
          example: "Not Found"
        message:
          type: string
          example: "Cart item not found"
        timestamp:
          type: string
          format: date-time
          example: "2024-06-20T08:00:00Z"
        trace_id:
          type: string
          example: "abc123xyz"

tags:
  - name: Cart Items
    description: Operations for retrieving cart items (read operations only)