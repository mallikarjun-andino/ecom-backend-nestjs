openapi: 3.0.3
info:
  title: Product Query API
  version: 1.0.0
  description: Read operations (Queries) for retrieving products in an e-commerce application

paths:

  # ---------------------------------------------------------------------------
  # GET /products — List products with filtering, sorting and pagination
  # ---------------------------------------------------------------------------
  /products:
    get:
      summary: List all products with filtering, sorting and pagination
      operationId: listProducts
      tags:
        - Products
      parameters:
        - $ref: './common/parameters.yaml#/components/parameters/TraceHeader'
        - $ref: './common/parameters.yaml#/components/parameters/BusinessUnitHeader'
        - $ref: './common/parameters.yaml#/components/parameters/CountryCodeHeader'
        - name: category_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: is_active
          in: query
          required: false
          schema:
            type: boolean
        - name: min_price
          in: query
          required: false
          schema:
            type: number
            format: float
            minimum: 0
        - name: max_price
          in: query
          required: false
          schema:
            type: number
            format: float
            minimum: 0
        - name: min_rating
          in: query
          required: false
          schema:
            type: number
            format: float
            minimum: 0
            maximum: 5
        - name: in_stock
          in: query
          required: false
          schema:
            type: boolean
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
            enum:
              - product_name
              - price
              - rating
              - stock
              - created_at
              - updated_at
            default: created_at
        - name: sort_order
          in: query
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: Products retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListProductsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  # ---------------------------------------------------------------------------
  # GET /products/{product_id} — Get a product by ID
  # ---------------------------------------------------------------------------
  /products/{product_id}:
    get:
      summary: Get a product by ID
      operationId: getProductById
      tags:
        - Products
      parameters:
        - $ref: '#/components/parameters/ProductIdPath'
        - $ref: './common/parameters.yaml#/components/parameters/TraceHeader'
        - $ref: './common/parameters.yaml#/components/parameters/BusinessUnitHeader'
        - $ref: './common/parameters.yaml#/components/parameters/CountryCodeHeader'
      responses:
        '200':
          description: Product retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProductByIdResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  # ---------------------------------------------------------------------------
  # GET /products/category/{category_id} — Get products by category
  # ---------------------------------------------------------------------------
  /products/category/{category_id}:
    get:
      summary: List all products belonging to a specific category
      operationId: getProductsByCategory
      tags:
        - Products
      parameters:
        - name: category_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: './common/parameters.yaml#/components/parameters/TraceHeader'
        - $ref: './common/parameters.yaml#/components/parameters/BusinessUnitHeader'
        - $ref: './common/parameters.yaml#/components/parameters/CountryCodeHeader'
        - name: is_active
          in: query
          required: false
          schema:
            type: boolean
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: sort_by
          in: query
          required: false
          schema:
            type: string
            enum:
              - product_name
              - price
              - rating
              - stock
              - created_at
              - updated_at
            default: created_at
        - name: sort_order
          in: query
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
            default: desc
      responses:
        '200':
          description: Products for the category retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetProductsByCategoryResponse'
        '404':
          $ref: '#/components/responses/NotFound'

# =============================================================================
# Components
# =============================================================================
components:

  # ---------------------------------------------------------------------------
  # Reusable Parameters
  # ---------------------------------------------------------------------------
  parameters:
    ProductIdPath:
      name: product_id
      in: path
      required: true
      description: UUID of the product
      schema:
        type: string
        format: uuid
        example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"

  # ---------------------------------------------------------------------------
  # Reusable Responses
  # ---------------------------------------------------------------------------
  responses:
    BadRequest:
      description: Invalid query parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  # ---------------------------------------------------------------------------
  # Schemas / DTOs
  # ---------------------------------------------------------------------------
  schemas:

    # ── Response DTOs ────────────────────────────────────────────────────────────
    
    ListProductsResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        pagination:
          type: object
          properties:
            page:
              type: integer
              example: 1
            limit:
              type: integer
              example: 20
            total:
              type: integer
              example: 150
            total_pages:
              type: integer
              example: 8

    GetProductByIdResponse:
      type: object
      properties:
        product_id:
          type: string
          format: uuid
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        product_name:
          type: string
          example: "iPhone 15 Case"
        category_id:
          type: string
          format: uuid
          example: "d4e5f6a7-b8c9-0123-def4-567890abcdef"
        price:
          type: number
          format: float
          example: 999.99
        stock:
          type: integer
          example: 100
        rating:
          type: number
          format: float
          nullable: true
          example: 4.5
        image:
          type: array
          items:
            type: string
            format: uri
          nullable: true
          example: ["https://cdn.example.com/product.jpg"]
        description:
          type: string
          nullable: true
          example: "Premium silicone case for iPhone 15"
        is_active:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: "2024-06-20T08:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2024-06-20T08:00:00Z"

    GetProductsByCategoryResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        pagination:
          type: object
          properties:
            page:
              type: integer
              example: 1
            limit:
              type: integer
              example: 20
            total:
              type: integer
              example: 45
            total_pages:
              type: integer
              example: 3

    # ── Reusable Product DTO ────────────────────────────────────────────────────
    Product:
      type: object
      properties:
        product_id:
          type: string
          format: uuid
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        product_name:
          type: string
          example: "iPhone 15 Case"
        category_id:
          type: string
          format: uuid
          example: "d4e5f6a7-b8c9-0123-def4-567890abcdef"
        price:
          type: number
          format: float
          example: 999.99
        stock:
          type: integer
          example: 100
        rating:
          type: number
          format: float
          nullable: true
          example: 4.5
        image:
          type: array
          items:
            type: string
            format: uri
          nullable: true
          example: ["https://cdn.example.com/product.jpg"]
        description:
          type: string
          nullable: true
          example: "Premium silicone case for iPhone 15"
        is_active:
          type: boolean
          example: true
        created_at:
          type: string
          format: date-time
          example: "2024-06-20T08:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2024-06-20T08:00:00Z"

    # ── Error DTO ─────────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          example: 400
        error:
          type: string
          example: "Bad Request"
        message:
          type: string
          example: "Invalid query parameters"
        timestamp:
          type: string
          format: date-time
          example: "2024-06-20T08:00:00Z"
        trace_id:
          type: string
          example: "abc123xyz"