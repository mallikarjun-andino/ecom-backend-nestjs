openapi: 3.0.3
info:
  title: Cart Command API
  version: 1.0.0
  description: Write operations for creating and deleting carts in the e-commerce application.

paths:

  # ---------------------------------------------------------------------------
  # POST /cart — Create a new cart
  # ---------------------------------------------------------------------------
  /cart:
    post:
      summary: Create a new cart
      operationId: createCart
      tags:
        - Cart
      parameters:
        - $ref: './common/parameters.yaml#/components/parameters/TraceHeader'
        - $ref: './common/parameters.yaml#/components/parameters/BusinessUnitHeader'
        - $ref: './common/parameters.yaml#/components/parameters/CountryCodeHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCartRequest'
      responses:
        '201':
          description: Cart created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCartResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  # ---------------------------------------------------------------------------
  # DELETE /cart/{cart_id} — Delete a cart
  # ---------------------------------------------------------------------------
  /cart/{cart_id}:
    delete:
      summary: Delete a cart
      operationId: deleteCart
      tags:
        - Cart
      parameters:
        - $ref: '#/components/parameters/CartIdPath'
        - $ref: './common/parameters.yaml#/components/parameters/TraceHeader'
        - $ref: './common/parameters.yaml#/components/parameters/BusinessUnitHeader'
        - $ref: './common/parameters.yaml#/components/parameters/CountryCodeHeader'
      responses:
        '200':
          description: Cart deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteCartResponse'
        '404':
          $ref: '#/components/responses/NotFound'

# =============================================================================
# Components
# =============================================================================
components:

  # ---------------------------------------------------------------------------
  # Reusable Parameters
  # ---------------------------------------------------------------------------
  parameters:
    CartIdPath:
      name: cart_id
      in: path
      required: true
      description: UUID of the cart
      schema:
        type: string
        format: uuid
        example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"

  # ---------------------------------------------------------------------------
  # Reusable Responses
  # ---------------------------------------------------------------------------
  responses:
    BadRequest:
      description: Invalid input or validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Resource conflict (user already has an active cart)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  # ---------------------------------------------------------------------------
  # Schemas / DTOs
  # ---------------------------------------------------------------------------
  schemas:

    # ── Request DTOs ────────────────────────────────────────────────────────────
    
    CreateCartRequest:
      type: object
      required:
        - user_id
      properties:
        user_id:
          type: string
          format: uuid
          example: "f7e8d9c0-b1a2-3456-7890-cdef12345678"

    # ── Response DTOs ────────────────────────────────────────────────────────────
    
    CreateCartResponse:
      type: object
      properties:
        cart_id:
          type: string
          format: uuid
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
        user_id:
          type: string
          format: uuid
          example: "f7e8d9c0-b1a2-3456-7890-cdef12345678"
        created_at:
          type: string
          format: date-time
          example: "2024-06-20T08:00:00Z"
        updated_at:
          type: string
          format: date-time
          example: "2024-06-20T08:00:00Z"

    DeleteCartResponse:
      type: object
      properties:
        message:
          type: string
          example: "Cart deleted successfully"
        cart_id:
          type: string
          format: uuid
          example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"

    # ── Error DTO ─────────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        status:
          type: integer
          example: 400
        error:
          type: string
          example: "Bad Request"
        message:
          type: string
          example: "Validation failed: user_id is required"
        timestamp:
          type: string
          format: date-time
          example: "2024-06-20T08:00:00Z"
        trace_id:
          type: string
          example: "abc123xyz"

tags:
  - name: Cart
    description: Operations for managing shopping carts